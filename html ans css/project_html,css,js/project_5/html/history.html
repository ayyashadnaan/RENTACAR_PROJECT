<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../css/history.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="logo-section">
            <img src="../images/car-pic.png" alt="Car Logo" class="logo-img">
            <span class="brand-name">RentACar</span>

            <!-- History Link with Icon after text -->
            <a href="history.html" class="history-link">
              History
                <i class="fa-solid fa-clock-rotate-left" id="history-icon"></i>
            </a>

            <!-- Logout Section -->
            <div class="logout-div">
                <label>Logout</label>
                <i class="fa-solid fa-right-from-bracket logout-icon" id="logout"></i>
            </div>
        </div>
    </header>

    <!-- Overlay (if needed for modal/background effect) -->
    <div class="overlay"></div>

    <!-- Trip History Section -->
    <div class="trip-history">
        <h1>Trip History:</h1>
    </div>
</body>
</html>
