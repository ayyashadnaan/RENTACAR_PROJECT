<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>RentACar</title>
</head>

<body>

    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="logo-section">
            <img src="../images/car-pic.png" alt="Car Logo">
            <span class="brand-name">RentACar</span>
            <a href="history.html" class="history-link">
              History
                <i class="fa-solid fa-clock-rotate-left" id="history-icon"></i>
            </a>
            <div class="logout-div">
            <label>Logout</label>
            <i class="fa-solid fa-right-from-bracket logout-icon " id="logout" ></i>
            </div>
        </div>
    </header>

    <!-- Black overlay / background -->
    <div class="overlay"></div>

    <!-- Main container / Trip planner -->
    <div class="trip-planner-container">
        <p class="trip-title">Plan your Trip</p>
        <h4 class="trip-subtitle">Choose your dates and destinations</h4>

        <!-- Pick-up Location -->
        <div class="pickup-location-section">
            <label class="pickup-label">
                <i class="fa-solid fa-location-crosshairs location-icon"></i>
                Pick-up Location
            </label>
            <div class="input-wrapper">
                <input type="text" placeholder="Pick-up Location" class="pickup-input">
            </div>
        </div>

        <!-- Destination -->
        <div class="destination-section">
            <label class="destination-label">
                <i class="fa-solid fa-map-marker-alt location-icon"></i>
                Destination
            </label>
            <div class="input-wrapper">
                <input type="text" placeholder="Where you want to go?" class="destination-input">
            </div>
        </div>

        <!-- Start Date -->
        <div class="start-date-section">
            <div class="date-wrapper">
                <label class="start-date-label">
                    <i class="fa-solid fa-calendar-days"></i>
                    Start Date
                </label>
                <div>
                    <input type="date" placeholder="mm/dd/yyyy" class="start-date-input">
                </div>
            </div>
        </div>

        <!-- End Date -->
        <div class="end-date-section">
            <div class="date-wrapper">
                <label class="end-date-label">
                    <i class="fa-solid fa-calendar-days"></i>
                    End Date
                </label>
                <div>
                    <input type="date" class="end-date-input">
                </div>
            </div>
        </div>

    </div>



    <!--journey section -->
    <div class="journey-section">
        <div class="journey-header">
            <button class="jr-btn">
                Start your journey
            </button>

        </div>
    </div>
    <!---->
    <div class="filter-bar">
        <div class="filer-icon">
            <i class="fa-solid fa-filter type-icon"></i>
            <label>Type:</label>
            <select class="section">
                <option class="input">All Typs</option>
                <option class="input">Sedan</option>
                <option class="input">SUV</option>
                <option class="input">Honda Civic</option>
                <option class="input">Tesla Model3</option>
                <option class="input">Ford Mustang</option>
                <option class="input">Mercedes V-Class</option>

            </select>
        </div>
        <!--seats-->
        <div class="seats-bar">
            <i class="fa-solid fa-users seat-icon"></i>
            <label>Min-sets:</label>
            <select class="section">
                <option class="input">Any</option>
                <option class="input">2+</option>
                <option class="input">4+</option>
                <option class="input">7+</option>
            </select>
        </div>
        <!--prices div-->
        <div class="max-price">
            <i class="fa-solid fa-dollar-sign price-icon"></i>
            <label>Max-price:</label>
            <input type="range" min="0" max="500" value="500" >
            <span>$500</span>
        </div>

        <!--price-range-->
        <div class="filter-icon">
            <i class="fa-solid fa-arrow-down-wide-short sort-icon"></i>
            <label>Price:</label>
            <select class="section">
                <option class="input">Low to High</option>
                <option class="input">High to Low</option>
            </select>

        </div>
    </div>

    <!---->
   <div class="car-container">
    <div class="car-card">
        <img src="../images/hundai-i10.png" alt="">
        <div class="car-info">
            <h3>Hyundai i10</h3>
            <p>Hatchback</p>
            <div class="details">
               
                <span><i class="fa-solid fa-car-side"></i>4 Seats</span>
                <span><i class="fa-solid fa-gear"></i>Manual</span>
            </div>
            <button class="book-btn">Book Now</button>
        </div>
        <div class="price">$35/day</div>
    </div>

    <div class="car-card">
        <img src="../images/toyota.png" alt="">
        <div class="car-info">
            <h3>Toyota Corolla</h3>
            <p>Sedan</p>
            <div class="details">
                <span><i class="fa-solid fa-car-side"></i>5 Seats</span>
                <span><i class="fa-solid fa-gear"></i>Manual</span>
            </div>
            <button class="book-btn">Book Now</button>
        </div>
        <div class="price">$45/day</div>
    </div>

    <div class="car-card">
        <img src="../images/honda-civic.png" alt="">
        <div class="car-info">
            <h3>Honda Civic</h3>
            <p>Sedan</p>
            <div class="details">
                <span><i class="fa-solid fa-car-side"></i>5 Seats</span>
                <span><i class="fa-solid fa-gauge"></i>Automatic</span>
            </div>
            <button class="book-btn">Book Now</button>
        </div>
        <div class="price">$55/day</div>
    </div>
<div class="car-card" id="tesla">
        <img src="../images/tesla.png" alt="">
        <div class="car-info">
            <h3>Honda Civic</h3>
            <p>Sedan</p>
            <div class="details">
                <span><i class="fa-solid fa-car-side"></i>5 Seats</span>
                <span><i class="fa-solid fa-gauge"></i>Automatic</span>
            </div>
            <button class="book-btn">Book Now</button>
        </div>
        <div class="price">$55/day</div>
    </div>
    <!-- যতো দরকার ততো card copy করতে পারবে -->
</div>
    </div>
 
    <script src="../js/dashboard.js"></script>
</body>

</html>
